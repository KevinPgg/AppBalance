<!DOCTYPE html>
<html lang="es" data-family="cafe" data-mode="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Café Ledger · referencia de estilos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
  /* Solo para esta demo: dos "teléfonos" lado a lado sobre un escritorio */
  body{ background:#c9bda8; }
  .desk{ display:flex; gap:32px; flex-wrap:wrap; justify-content:center; padding:40px 20px; }
  .phone{ position:relative; width:340px; height:720px; border-radius:34px; overflow:hidden; background:var(--bg); box-shadow:0 30px 60px -30px rgba(40,25,15,.6); display:flex; flex-direction:column; }
  .phone .scroll{ flex:1; }
  .pad{ padding:0 16px; }
</style>
</head>
<body>
<div class="desk">

  <!-- ================= INICIO ================= -->
  <div class="phone">
    <div class="scroll">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px 6px">
        <div>
          <div style="font-weight:600;font-size:12px;color:var(--muted)">Buenos días</div>
          <div style="font-family:var(--font-display);font-weight:800;font-size:18px">Martín</div>
        </div>
        <!-- Toggle claro/oscuro superior -->
        <button data-mode-toggle style="cursor:pointer;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);color:var(--ink);padding:6px 8px 6px 13px;border-radius:999px;font-weight:700;font-size:12px">
          <span data-theme-label>Latte</span>
          <span style="width:38px;height:22px;border-radius:999px;background:var(--espresso);display:inline-flex;align-items:center;padding:3px">
            <span style="width:16px;height:16px;border-radius:50%;background:var(--gold)"></span>
          </span>
        </button>
      </div>

      <!-- HERO -->
      <div class="pad" style="margin-top:8px">
        <div class="hero">
          <div class="hero__label">Saldo actual</div>
          <div class="hero__amount">81,10 <small>US$</small></div>
          <div class="hero__stats">
            <div class="hero__stat"><div class="k">GASTADO · JUL</div><div class="v spent">130,66</div></div>
            <div class="hero__stat"><div class="k">INGRESOS</div><div class="v income">314,00</div></div>
          </div>
        </div>
      </div>

      <!-- PRESUPUESTOS -->
      <div class="pad" style="margin-top:16px">
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
            <span class="section-title">Presupuestos</span><span class="link">Ver todos</span>
          </div>
          <div style="margin-bottom:15px">
            <div class="budget__head"><span style="font-weight:600;font-size:13px">Café</span><span style="font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--caramel)">62%</span></div>
            <div class="budget__track"><div class="budget__fill" style="width:62%"></div></div>
          </div>
          <div>
            <div class="budget__head"><span style="font-weight:600;font-size:13px">Delivery</span><span style="font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--muted)">40%</span></div>
            <div class="budget__track"><div class="budget__fill" style="width:40%"></div></div>
          </div>
        </div>
      </div>

      <!-- MOVIMIENTOS -->
      <div class="pad" style="margin-top:20px">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px">
          <span class="section-title">Últimos movimientos</span><span class="link">Ver todos</span>
        </div>
        <div class="row"><div class="row__icon">☕</div><div class="row__body"><div class="row__name">Café de especialidad</div><div class="row__meta">2/7/2026</div></div><div class="row__amt neg">– 12,00</div></div>
        <div class="divider"></div>
        <div class="row"><div class="row__icon">🛒</div><div class="row__body"><div class="row__name">Uber eats</div><div class="row__meta">3/7/2026</div></div><div class="row__amt neg">– 12,00</div></div>
        <div class="divider"></div>
        <div class="row"><div class="row__icon income">↑</div><div class="row__body"><div class="row__name">Ingreso</div><div class="row__meta">30/6/2026</div></div><div class="row__amt pos">+ 314,00</div></div>
      </div>
    </div>

    <!-- FAB overlay + menú -->
    <div class="fab-overlay" data-fab-overlay></div>
    <div class="fab-menu" data-fab-menu>
      <button class="fab-item fab-item--expense"><span class="ic">☕</span><span style="flex:1;text-align:left">Registrar consumo</span></button>
      <button class="fab-item fab-item--income"><span class="ic">↑</span><span style="flex:1;text-align:left">Registrar ingreso</span></button>
    </div>

    <!-- TABBAR -->
    <div class="tabbar">
      <button class="tab tab--active"><span>🏠</span>Inicio</button>
      <button class="tab"><span>📊</span>Métricas</button>
      <button class="fab" data-fab>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button class="tab"><span>🎁</span>Beneficios</button>
      <button class="tab"><span>⚙️</span>Ajustes</button>
    </div>
  </div>

  <!-- ================= AJUSTES ================= -->
  <div class="phone">
    <div class="scroll pad" style="padding-top:16px">
      <div style="font-family:var(--font-display);font-weight:800;font-size:22px;padding:6px 2px 16px">Ajustes</div>

      <div style="display:flex;flex-direction:column;gap:12px">

        <!-- IVA (colapsado) -->
        <div class="acc" data-acc>
          <div class="acc__head"><span class="acc__title">IVA</span><span class="acc__sign">+</span></div>
          <div class="acc__body">
            <div class="divider" style="margin-bottom:14px"></div>
            <div style="display:flex;align-items:center;gap:10px">
              <div style="display:flex;align-items:center;gap:6px;background:var(--foam);border:1.5px solid var(--line);border-radius:13px;padding:11px 14px"><b style="font-family:var(--font-display);font-size:16px">15</b><span style="color:var(--muted);font-size:13px">%</span></div>
              <button class="btn btn--primary" style="flex:1">Guardar</button>
            </div>
          </div>
        </div>

        <!-- CUENTA (abierto) con selector de tema -->
        <div class="acc open" data-acc>
          <div class="acc__head"><span class="acc__title">Cuenta</span><span class="acc__sign">−</span></div>
          <div class="acc__body">
            <div class="divider" style="margin-bottom:12px"></div>

            <div style="font-weight:700;font-size:11px;letter-spacing:.1em;color:var(--muted);margin-bottom:10px">PALETA</div>
            <div class="palette-grid" style="margin-bottom:16px">
              <button class="palette" data-family-btn="cafe">
                <span class="swatches">
                  <span class="sw" style="background:linear-gradient(135deg,#5A4535,#33261E)"></span>
                  <span class="sw" style="background:#EFE7DA;border:1px solid #E5DACA"></span>
                  <span class="sw" style="background:#B07A44"></span>
                </span>Café
              </button>
              <button class="palette" data-family-btn="cherry">
                <span class="swatches">
                  <span class="sw" style="background:linear-gradient(135deg,#C23256,#7C1734)"></span>
                  <span class="sw" style="background:#FDEDF1;border:1px solid #F6D4DD"></span>
                  <span class="sw" style="background:#D94E72"></span>
                </span>Cherry
              </button>
            </div>

            <div style="font-weight:700;font-size:11px;letter-spacing:.1em;color:var(--muted);margin-bottom:10px">MODO</div>
            <div class="segmented" style="margin-bottom:14px">
              <button data-mode-btn="light">☀︎ <span data-mode-name="light">Latte</span></button>
              <button data-mode-btn="dark">☾ <span data-mode-name="dark">Espresso</span></button>
            </div>

            <button class="btn" style="width:100%;background:var(--foam);border:1px solid var(--line);color:var(--neg)">Cerrar sesión</button>
          </div>
        </div>

      </div>
    </div>

    <div class="tabbar">
      <button class="tab"><span>🏠</span>Inicio</button>
      <button class="tab"><span>📊</span>Métricas</button>
      <button class="tab"><span>🎁</span>Beneficios</button>
      <button class="tab tab--active"><span>⚙️</span>Ajustes</button>
    </div>
  </div>

</div>

<script src="theme.js"></script>
</body>
</html>
